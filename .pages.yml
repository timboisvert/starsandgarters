media:
  input: posters
  output: /posters

content:
  - name: events
    label: Events / Showtimes
    type: file
    path: src/_data/events.json
    list: true
    view:
      fields: [date, time, show, title]
      primary: show
      sort: [date, time]
    fields:
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: time
        label: Time
        type: string
        required: true
        description: "e.g. 8:00 PM"
      - name: show
        label: Show
        type: reference
        required: true
        options:
          collection: shows
          value: "{slug}"
          label: "{title}"
          search: [title, slug]
      - name: title
        label: Event title (optional)
        type: string
        description: "Specific name for this date, e.g. a guest or theme. Leave blank to use the show's name."
      - name: displayName
        label: Display name override (optional)
        type: string
        description: "Overrides the full calendar title entirely. Rarely needed."
      - name: tagline
        label: Tagline (optional)
        type: string
      - name: poster
        label: Poster filename (optional)
        type: string
        description: "Just the filename, e.g. rising-stars.png. Leave blank to use the show's poster."
      - name: ticketUrl
        label: Ticket URL (optional)
        type: string
        description: "Overrides the show's default ticket link for this date."
      - name: freeAtDoor
        label: Free at the door
        type: boolean
        description: "Hides the ticket button and marks the event free."
      - name: description
        label: Description (optional)
        type: text

  - name: closures
    label: Theater Closures
    type: file
    path: src/_data/closures.json
    list: true
    view:
      fields: [date, label]
      primary: date
      sort: [date]
    fields:
      - name: date
        label: Date
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: label
        label: Label
        type: string
        required: true
        default: Theater Closed

  - name: shows
    label: Shows
    type: file
    path: src/_data/shows.json
    list: true
    view:
      fields: [title, slug, room]
      primary: title
      sort: [title]
    fields:
      - name: slug
        label: Slug (URL id)
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9-]+$"
          message: "Lowercase letters, numbers, and hyphens only."
        description: "Used in events and page URLs. Don't change once a show is live."
      - name: title
        label: Title
        type: string
        required: true
      - name: tagline
        label: Tagline
        type: string
      - name: poster
        label: Poster filename
        type: string
        description: "Just the filename, e.g. rising-stars.png"
      - name: ticketUrl
        label: Ticket URL
        type: string
      - name: buttonText
        label: Button text
        type: string
        description: "e.g. Buy Tickets, Sign Up. Leave blank for the default."
      - name: price
        label: Price
        type: string
        description: "e.g. $20, Free"
      - name: room
        label: Room
        type: select
        options:
          values: [Main Stage, Rouge Room]
      - name: description
        label: Description
        type: text
      - name: isIndex
        label: Show on homepage
        type: boolean
      - name: hideBaseFromHomepage
        label: Hide base show from homepage
        type: boolean
        description: "Show only its dated events on the homepage, not the show itself."
      - name: indexDays
        label: Homepage window (days)
        type: number
        description: "How many days ahead to list this show's events. Leave blank for the default."
      - name: createEventPages
        label: Create individual event pages
        type: boolean
      - name: eventTitleFormat
        label: Event title format
        type: select
        options:
          values: [event-first]
        description: "Leave blank for 'Show: Event'. 'event-first' gives 'Event: Show'."
      - name: landingPages
        label: Landing pages
        type: string
        list: true
        description: "e.g. burlesque"
