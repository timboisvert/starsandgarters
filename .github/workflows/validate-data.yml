name: Validate data files

# Safety net for edits made via Pages CMS or directly on GitHub.
# Fails loudly if any data file is not valid JSON, before Vercel builds it.

on:
  push:
    paths:
      - "src/_data/**.json"
  pull_request:
    paths:
      - "src/_data/**.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every data file parses as JSON
        run: |
          status=0
          for f in src/_data/*.json; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "ok    $f"
            else
              echo "BROKEN $f"
              python3 -m json.tool "$f" || true
              status=1
            fi
          done
          exit $status
